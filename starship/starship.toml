add_newline = true
command_timeout = 1200

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$bun\
$golang\
$python\
$rust\
$dotnet\
$cmd_duration\
$line_break\
$character"""

[fill]
symbol = " "

[character]
success_symbol = "[>](bold fg:#8bd5ca)"
error_symbol = "[>](bold fg:#ed8796)"
vimcmd_symbol = "[<](bold fg:#f5a97f)"

[os]
disabled = false
format = "[$symbol](bold fg:#c6a0f6) "

[os.symbols]
Macos = "mac"

[username]
show_always = true
style_user = "bold fg:#8aadf4"
style_root = "bold fg:#ed8796"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "fg:#939ab7"
format = " [@](fg:#6e738d) [$hostname]($style) "

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold fg:#eed49f"
read_only = " lock"
format = "in [$path]($style)[$read_only](fg:#ed8796) "

[git_branch]
symbol = "git "
style = "fg:#a6da95"
format = "on [$symbol$branch]($style) "

[git_status]
style = "fg:#f5a97f"
format = '([$all_status$ahead_behind]($style) )'

[nodejs]
symbol = "node "
style = "fg:#a6da95"
format = '[$symbol($version )]($style)'

[bun]
symbol = "bun "
style = "fg:#91d7e3"
format = '[$symbol($version )]($style)'

[golang]
symbol = "go "
style = "fg:#7dc4e4"
format = '[$symbol($version )]($style)'

[python]
symbol = "py "
style = "fg:#f5bde6"
format = '[$symbol($version )]($style)'

[rust]
symbol = "rs "
style = "fg:#f5a97f"
format = '[$symbol($version )]($style)'

[dotnet]
symbol = ".net "
style = "fg:#c6a0f6"
format = '[$symbol($version )]($style)'

[cmd_duration]
min_time = 1200
style = "fg:#939ab7"
format = "[took $duration]($style)"
